<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">🎰</div>
  <h1 class="auth-title">SLOTCASINO TASIRIN</h1>
  <p class="auth-sub">Premium Slot Experience</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <div id="loginError" class="form-error"></div>
    <button type="submit" class="auth-btn">MASUK</button>
  </form>

<script src="/js/fingerprint.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/api.js"></script>
<script>
(function(){
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err = document.getElementById('loginError');
    err.textContent = '';

    const fingerprint = window.getDeviceFingerprint ? window.getDeviceFingerprint() : navigator.userAgent;

    const res = await api.post('/api/login', { 
      username: user, 
      password: pass,
      fingerprint: fingerprint
    });
    if (res.error) { err.textContent = res.error; return; }
    api.setToken(res.token);
    window.location.href = res.user.isAdmin ? 'admin.html' : '/';
  });
})();
</script>
