<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>slotcasino tasirin — Login</title>
<style>
/* Anti-FOUC: hide body until CSS + JS loaded */
html, body { margin: 0; padding: 0; background: #050008; }
body { opacity: 0; background: #050008; overflow-x: hidden; }
</style>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/nav.css">


</head>
<body><script src="/js/fouc.js"></script>

<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">🎰</div>
  <h1 class="auth-title">SLOTCASINO TASIRIN</h1>
  <p class="auth-sub">Premium Slot Experience</p>
  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <div id="loginError" class="form-error"></div>
    <button type="submit" class="auth-btn">MASUK</button>
  </form>
  <p class="auth-link">Belum punya akun? <a href="register.html">Daftar</a></p>
</div>
<script src="/js/nav.js"></script>
<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  err.textContent = '';

  const res = await api.post('/api/login', { username: user, password: pass });
  if (res.error) { err.textContent = res.error; return; }
  api.setToken(res.token);
  window.location.href = res.user.isAdmin ? 'admin.html' : '/';
});
</script>
</body>
</html>
