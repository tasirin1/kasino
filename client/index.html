<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>slotcasino tasirin — Game</title>
<style>
/* Anti-FOUC: dark bg immediately, hide body until ready */
html { background: #050008; min-height: 100vh; }
body { margin: 0; padding: 0; background: #050008; opacity: 0; overflow-x: hidden; min-height: 100vh; }
</style>
<link rel="preload" href="/css/style.css" as="style">
<link rel="preload" href="/css/nav.css" as="style">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/nav.css">


</head>
<body>
  <!-- INLINE SPLASH: visible immediately, hidden by JS after load -->
  <div id="appSplash" class="splash-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:flex;align-items:center;justify-content:center;background:#050008;flex-direction:column;transition:opacity 0.4s ease,transform 0.4s ease">
    <div style="font-size:48px;margin-bottom:8px">🎰</div>
    <div style="color:#D5AD6D;font-size:22px;font-weight:bold;letter-spacing:4px;text-transform:uppercase">SLOTCASINO</div>
    <div style="color:rgba(180,160,220,0.4);font-size:13px;margin-bottom:24px">Tasirin</div>
    <div style="width:120px;height:3px;background:rgba(213,173,109,0.15);border-radius:2px;overflow:hidden">
      <div style="width:40%;height:100%;background:#D5AD6D;border-radius:2px;animation:splashLoad 1.2s ease-in-out infinite"></div>
    </div>
    <style>@keyframes splashLoad{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(400%)}}@keyframes splashPulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}</style>
  </div>
<script src="/js/fouc.js"></script>
<div id="app">
  <!-- TOP BAR -->
  <header id="topBar">
    <div class="h-left">
      <div class="h-item"><span class="h-lbl">BALANCE</span><span id="balanceDisplay" class="h-val">0</span></div>
    </div>
    <div class="h-center"><span class="h-title">slt</span></div>
    <div class="h-right">
      <div class="h-item"><span class="h-lbl">BET</span><span id="betDisplay" class="h-val gold">100</span></div>
      <button id="logoutBtn" class="h-reset" title="Logout">🚪</button>
    </div>
  </header>

  <!-- WIN MSG -->
  <div id="winMsg"><span id="winText">🎰 SPIN TO WIN</span></div>

  <!-- REELS -->
  <div id="reels">
    <div class="reel" data-reel="0"></div>
    <div class="reel" data-reel="1"></div>
    <div class="reel" data-reel="2"></div>
  </div>

  <!-- CONTROLS -->
  <div id="controls">
    <div class="c-row c-top">
      <div class="bet-group">
        <button id="betDown" class="bet-btn">−</button>
        <div class="bet-display"><span class="bet-lbl">BET</span><span id="betDisplay2" class="bet-val">100</span></div>
        <button id="betUp" class="bet-btn">+</button>
      </div>
      <div class="win-group"><span class="win-lbl">WIN</span><span id="winDisplay" class="win-val">—</span></div>
    </div>
    <div class="c-row c-bottom">
      <div class="ctrl-left">
        <label class="toggle"><input type="checkbox" id="autoplay"><span>AUTO</span></label>
        <label class="toggle"><input type="checkbox" id="turboMode"><span>TURBO</span></label>
      </div>
      <button id="spinBtn" class="spin-btn">SPIN</button>
      <div class="ctrl-right"><button id="maxBet" class="ctrl-btn">MAX</button></div>
    </div>
  </div>
</div>

<div id="historyPanel" class="history-panel">
  <div class="history-header"><span>Riwayat</span><button id="closeHistory">✕</button></div>
  <div id="historyList"></div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/game.js"></script>
</body>
</html>
