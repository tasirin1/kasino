<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bgCoin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0010"/>
      <stop offset="50%" style="stop-color:#4a0030"/>
      <stop offset="100%" style="stop-color:#1a0010"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bgCoin)"/>
  <rect x="10" y="10" width="300" height="160" rx="8" fill="none" stroke="#D5AD6D" stroke-width="1" opacity="0.3"/>
  <!-- Coin -->
  <circle cx="160" cy="75" r="40" fill="url(#bgCoin)" stroke="#D5AD6D" stroke-width="3"/>
  <circle cx="160" cy="75" r="35" fill="none" stroke="#D5AD6D" stroke-width="0.5" opacity="0.5"/>
  <text x="160" y="85" text-anchor="middle" fill="#D5AD6D" font-size="32" font-weight="bold">$</text>
  <!-- Heads and Tails -->
  <text x="80" y="155" text-anchor="middle" fill="#D5AD6D" font-size="12" opacity="0.5">HEADS</text>
  <text x="240" y="155" text-anchor="middle" fill="#D5AD6D" font-size="12" opacity="0.5">TAILS</text>
  <!-- Arrow -->
  <polygon points="160,20 155,30 165,30" fill="#D5AD6D" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <text x="160" y="172" text-anchor="middle" fill="#D5AD6D" font-size="9" opacity="0.5">COIN FLIP</text>
</svg>
