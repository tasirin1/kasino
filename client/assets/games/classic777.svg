  <!-- Slot reels -->
  <rect x="35" y="30" width="70" height="120" rx="6" fill="#000" stroke="url(#gold777)" stroke-width="1.5"/>
  <rect x="125" y="30" width="70" height="120" rx="6" fill="#000" stroke="url(#gold777)" stroke-width="1.5"/>
