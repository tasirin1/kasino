  <!-- Symbols -->
  <text x="70" y="95" text-anchor="middle" fill="#CC0000" font-size="28" font-weight="bold">7</text>
  <text x="160" y="95" text-anchor="middle" fill="#FFD700" font-size="24" font-weight="bold">BAR</text>
  <text x="250" y="95" text-anchor="middle" fill="#FF6666" font-size="28" font-weight="bold">7</text>
