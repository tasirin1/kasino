<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="bgFruit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a00"/>
      <stop offset="50%" style="stop-color:#1a4a00"/>
      <stop offset="100%" style="stop-color:#0a1a00"/>
    </linearGradient>
    <linearGradient id="goldFruit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bgFruit)"/>
  <rect x="10" y="10" width="300" height="160" rx="8" fill="none" stroke="url(#goldFruit)" stroke-width="1" opacity="0.3"/>
  <!-- Fruits grid -->
  <text x="60" y="65" text-anchor="middle" font-size="34">🍒</text>
  <text x="160" y="65" text-anchor="middle" font-size="34">🍋</text>
  <text x="260" y="65" text-anchor="middle" font-size="34">🍊</text>
  <text x="60" y="125" text-anchor="middle" font-size="34">🍇</text>
  <text x="160" y="125" text-anchor="middle" font-size="34">🍉</text>
  <text x="260" y="125" text-anchor="middle" font-size="34">🍑</text>
  <text x="160" y="170" text-anchor="middle" fill="url(#goldFruit)" font-size="10" opacity="0.6">LUCKY FRUITS</text>
</svg>
